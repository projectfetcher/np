name: Nepal Jobs Scraper

on:
  schedule:
    - cron: "0 */2 * * *"   # every 3 hours
  workflow_dispatch:
    inputs:
      pages:
        description: "Number of listing pages to scrape (0 = all)"
        required: false
        default: "0"
      max_jobs:
        description: "Stop after this many new jobs (0 = no limit)"
        required: false
        default: "0"
      enable_paraphrase:
        description: "Paraphrase via Mistral (1 = on, 0 = off)"
        required: false
        default: "1"
      resolve_apply_urls:
        description: "Follow apply-now redirects (1 = on, 0 = off)"
        required: false
        default: "1"

# Prevent two runs from overlapping and double-posting the same job
concurrency:
  group: nepal-scraper
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit the updated dedup tracker back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          MAX_PAGES: ${{ github.event.inputs.pages || '0' }}
          MAX_JOBS: ${{ github.event.inputs.max_jobs || '0' }}
          REQUEST_DELAY: "2.0"
          RESOLVE_APPLY_URLS: ${{ github.event.inputs.resolve_apply_urls || '1' }}
          RESOLVE_DELAY: "0.5"
          ENABLE_PARAPHRASE: ${{ github.event.inputs.enable_paraphrase || '1' }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: np.py

      - name: Upload run artifacts (Excel + CSVs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nepal-jobs-output-${{ github.run_number }}
          path: |
            jobs_output.xlsx
            processed_jobs.csv
            flagged_no_apply.csv
          if-no-files-found: warn

      - name: Commit updated dedup tracker back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create the file if it doesn't exist yet so git add never fails
          touch processed_jobs.csv flagged_no_apply.csv
          git add processed_jobs.csv flagged_no_apply.csv
          git diff --cached --quiet || git commit -m "chore: update Nepal dedup tracker [skip ci]"
          git push
